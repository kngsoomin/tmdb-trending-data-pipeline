x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: tmdb-airflow:local
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags

    PYTHONPATH: /opt/project
    PROJECT_ROOT: /opt/project

    TMDB_API_KEY: ${TMDB_API_KEY}

    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    TMDB_S3_BUCKET: ${TMDB_S3_BUCKET}
    TMDB_S3_PREFIX: ${TMDB_S3_PREFIX}

    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER}
    SNOWFLAKE_PRIVATE_KEY_PATH: /home/airflow/.snowflake/keys/dbt_svc_key.p8
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE}

  volumes:
    - .:/opt/project
    - airflow-logs:/opt/project/airflow/logs
    - ~/.snowflake:/home/airflow/.snowflake:ro
    - /var/run/docker.sock:/var/run/docker.sock

  user: '${AIRFLOW_UID:-50000}:0'
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'airflow']
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow:
    <<: *airflow-common
    command: >
      bash -c "airflow scheduler & airflow webserver"
    ports:
      - '8081:8080'
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/project/airflow/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/project/airflow/logs
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: '0:0'

  airflow-cli:
    <<: *airflow-common
    profiles: ['debug']
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: '0'
    command: ['bash', '-c', 'airflow']

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    image: tmdb-dbt:local
    working_dir: /opt/project/dbt/tmdb_dbt
    environment:
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PRIVATE_KEY_PATH: /root/.snowflake/keys/dbt_svc_key.p8
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE}
    volumes:
      - .:/opt/project
      - ~/.dbt:/root/.dbt:ro
      - ~/.snowflake:/root/.snowflake:ro
    tty: true

volumes:
  postgres-db-volume:
  airflow-logs: